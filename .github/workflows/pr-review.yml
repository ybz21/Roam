name: Automated PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Policy Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run repository review
        id: review
        continue-on-error: true
        run: |
          scripts/quality/review.sh "${{ github.base_ref }}" review.md
          cat review.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('review.md', 'utf8')
            const marker = '<!-- ttmux-automated-review -->'
            const issue_number = context.issue.number
            const { owner, repo } = context.repo
            const nextBody = `${marker}\n${body}`
            // 来自 fork 的 PR 拿到的 GITHUB_TOKEN 是只读的，发评论会 403。
            // 这种情况下别让整个 job 失败——审查正文已写进 step summary，降级为告警即可。
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              })
              const existing = comments.find(comment =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
              )
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: nextBody,
                })
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: nextBody,
                })
              }
            } catch (e) {
              core.warning(`跳过发表审查评论（fork PR 的令牌通常只读，无法评论）：${e.message}`)
            }

      - name: Fail on blocking findings
        if: steps.review.outcome == 'failure'
        run: exit 1
